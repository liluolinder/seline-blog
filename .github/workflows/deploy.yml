name: Build & Push to liluolinder.github.io

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push to liluolinder.github.io
        run: |
          cd out
          git init
          git add -A
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git remote add origin https://liluolinder:${{ secrets.DEPLOY_TOKEN }}@github.com/liluolinder/liluolinder.github.io.git
          git branch -M main
          git push -f origin main
