name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine base path
        run: |
          # 用户/组织站 (username.github.io) → 无前缀
          # 项目站 (username/repo) → 前缀 /repo
          REPO="${{ github.repository }}"
          if echo "$REPO" | grep -q '\.github\.io$'; then
            echo "用户/组织站，无需前缀"
            echo "NEXT_PUBLIC_BASE_PATH=" >> $GITHUB_ENV
          else
            PREFIX="/${{ github.event.repository.name }}"
            echo "项目站，前缀: $PREFIX"
            echo "NEXT_PUBLIC_BASE_PATH=$PREFIX" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build

      - name: Fix asset paths in HTML
        run: |
          PREFIX="${NEXT_PUBLIC_BASE_PATH}"
          if [ -n "$PREFIX" ]; then
            # images (HTML)
            find out -name '*.html' -exec sed -i "s|src=\"/images/|src=\"${PREFIX}/images/|g" {} +
            find out -name '*.html' -exec sed -i "s|src='/images/|src='${PREFIX}/images/|g" {} +
            find out -name '*.html' -exec sed -i "s|href=\"/images/|href=\"${PREFIX}/images/|g" {} +
            # fonts & images (CSS + HTML)
            find out \( -name '*.html' -o -name '*.css' \) -exec sed -i "s|url('/images/|url('${PREFIX}/images/|g" {} +
            find out \( -name '*.html' -o -name '*.css' \) -exec sed -i "s|url('/fonts/|url('${PREFIX}/fonts/|g" {} +
            find out \( -name '*.html' -o -name '*.css' \) -exec sed -i 's|url("/images/|url("'${PREFIX}'/images/|g' {} +
            find out \( -name '*.html' -o -name '*.css' \) -exec sed -i 's|url("/fonts/|url("'${PREFIX}'/fonts/|g' {} +
            echo "路径修正完成"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
