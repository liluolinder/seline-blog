name: Build & Push to liluolinder.github.io

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add .nojekyll for GitHub Pages
        run: touch out/.nojekyll

      - name: Push to liluolinder.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: liluolinder/liluolinder.github.io
          publish_dir: ./out
          publish_branch: main
          force_orphan: true
          user_name: github-actions
          user_email: actions@github.com
