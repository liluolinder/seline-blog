name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # 动态计算 basePath：用户站 → ''，项目站 → /repo名
    env:
      NEXT_PUBLIC_BASE_PATH: ${{ endsWith(github.repository, '.github.io') && '' || format('/{0}', github.event.repository.name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fix asset paths in built output
        run: |
          PREFIX="$NEXT_PUBLIC_BASE_PATH"
          if [ -n "$PREFIX" ]; then
            echo "添加前缀: $PREFIX"
            # 1) HTML 属性: src="/images/  href="/images/
            find out -name '*.html' -exec sed -i "s|src=\"/images/|src=\"${PREFIX}/images/|g" {} +
            find out -name '*.html' -exec sed -i "s|href=\"/images/|href=\"${PREFIX}/images/|g" {} +
            # 2) React 水合 JSON: "src":"/images/  "href":"/images/
            find out -name '*.html' -exec sed -i 's|"src":"/images/|"src":"'${PREFIX}'/images/|g' {} +
            find out -name '*.html' -exec sed -i 's|"href":"/images/|"href":"'${PREFIX}'/images/|g' {} +
            # 3) CSS/HTML url()（单引号、双引号、无引号）
            find out \( -name '*.html' -o -name '*.css' \) \
              -exec sed -i "s|url('/images/|url('${PREFIX}/images/|g" {} + \
              -exec sed -i 's|url("/images/|url("'${PREFIX}'/images/|g' {} + \
              -exec sed -i "s|url(/images/|url(${PREFIX}/images/|g" {} +
            find out \( -name '*.html' -o -name '*.css' \) \
              -exec sed -i "s|url('/fonts/|url('${PREFIX}/fonts/|g" {} + \
              -exec sed -i 's|url("/fonts/|url("'${PREFIX}'/fonts/|g' {} + \
              -exec sed -i "s|url(/fonts/|url(${PREFIX}/fonts/|g" {} +
            echo "完成"
          else
            echo "无需前缀"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
